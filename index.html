<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わんにゃんカルテ</title>
<style>
  :root{
    --bg:#F8F3EA; --surface:#FFFBF5; --primary:#5D7D69; --primary-deep:#3E5D4C;
    --accent:#D89B7E; --text:#4F4239; --text-soft:#7B6D62; --border:#E9DCC7;
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--bg); color:var(--text); text-align:center;
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",
      "Yu Gothic",sans-serif; line-height:1.8; -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px; margin:0 auto; padding:64px 22px 80px;}
  .icon{width:104px; height:104px; border-radius:24px; box-shadow:0 6px 20px rgba(0,0,0,.10);}
  h1{font-size:28px; margin:22px 0 6px; color:var(--primary-deep);}
  .tagline{font-size:15px; color:var(--text-soft); margin:0 0 4px;}
  .lead{font-size:15px; margin:24px 0 0;}
  .links{margin-top:36px; display:flex; flex-direction:column; gap:14px;}
  .btn{
    display:block; background:var(--surface); border:1px solid var(--border);
    border-radius:16px; padding:16px 20px; text-decoration:none; color:var(--primary-deep);
    font-weight:700; box-shadow:0 2px 10px rgba(0,0,0,.04); transition:transform .08s ease;
  }
  .btn:active{transform:scale(.99);}
  .btn small{display:block; font-weight:400; color:var(--text-soft); font-size:13px; margin-top:2px;}
  footer{margin-top:40px; font-size:13px; color:var(--text-soft);}
</style>
</head>
<body>
<div class="wrap">
  <img class="icon" src="./icon.png" alt="わんにゃんカルテアイコン">
  <h1>わんにゃんカルテ</h1>
  <div class="tagline">子犬・子猫から、シニアまで。この子を、ずっと見守る。</div>
  <p class="lead">毎日の食事・体調・体重から、お薬や通院の記録まで。うちの子の健康のすべてを、やさしく1冊に。</p>

  <div class="links">
    <a class="btn" href="./privacy.html">プライバシーポリシー<small>データの取り扱いについて</small></a>
    <a class="btn" href="./support.html">サポート・お問い合わせ<small>よくある質問と連絡先</small></a>
  </div>

  <footer>運営者：株式会社フロンティア</footer>
</div>
</body>
</html>
